<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Prompt Library Logo Proposals</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: #050505;
        color: #f4f4f5;
      }
      body { margin: 0; padding: 32px; }
      main { max-width: 1180px; margin: 0 auto; }
      h1, h2, p { margin: 0; }
      h1 { font-size: 28px; line-height: 1.2; }
      h2 { font-size: 20px; line-height: 1.25; }
      p { margin-top: 8px; color: #a1a1aa; }
      section { margin-top: 34px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-top: 16px; }
      .landscape { grid-template-columns: 1fr; }
      figure { margin: 0; padding: 16px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; }
      .light-surface { background: #f4f4f5; border-color: #d4d4d8; }
      a { color: inherit; text-decoration: none; }
      a:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 4px; }
      img { display: block; width: 100%; height: auto; }
      .icon img { max-width: 180px; margin: 0 auto; }
      figcaption { margin-top: 12px; color: #d4d4d8; font-size: 14px; }
      .light-surface figcaption { color: #3f3f46; }
    </style>
  </head>
  <body>
    <main>
      <h1>My Prompt Library Logo Proposals</h1>
      <p>Three square favicon/button icons and three landscape GitHub/website logos, each in dark and light variants.</p>

      <section>
        <h2>Square Dark</h2>
        <div class="grid">
          <figure class="icon">
            <a href="./icons/dark/favicon-01-template-vault.svg">
              <img src="./icons/dark/favicon-01-template-vault.svg" alt="Template Vault square icon" />
              <figcaption>01 Template Vault</figcaption>
            </a>
          </figure>
          <figure class="icon">
            <a href="./icons/dark/favicon-02-skill-packs.svg">
              <img src="./icons/dark/favicon-02-skill-packs.svg" alt="Skill Packs square icon" />
              <figcaption>02 Skill Packs</figcaption>
            </a>
          </figure>
          <figure class="icon">
            <a href="./icons/dark/favicon-03-fuzzy-search.svg">
              <img src="./icons/dark/favicon-03-fuzzy-search.svg" alt="Fuzzy Search square icon" />
              <figcaption>03 Fuzzy Search</figcaption>
            </a>
          </figure>
        </div>
      </section>

      <section>
        <h2>Square Light</h2>
        <div class="grid">
          <figure class="icon light-surface">
            <a href="./icons/light/favicon-01-template-vault-light.svg">
              <img src="./icons/light/favicon-01-template-vault-light.svg" alt="Template Vault light square icon" />
              <figcaption>01 Template Vault Light</figcaption>
            </a>
          </figure>
          <figure class="icon light-surface">
            <a href="./icons/light/favicon-02-skill-packs-light.svg">
              <img src="./icons/light/favicon-02-skill-packs-light.svg" alt="Skill Packs light square icon" />
              <figcaption>02 Skill Packs Light</figcaption>
            </a>
          </figure>
          <figure class="icon light-surface">
            <a href="./icons/light/favicon-03-fuzzy-search-light.svg">
              <img src="./icons/light/favicon-03-fuzzy-search-light.svg" alt="Fuzzy Search light square icon" />
              <figcaption>03 Fuzzy Search Light</figcaption>
            </a>
          </figure>
        </div>
      </section>

      <section>
        <h2>Landscape Dark</h2>
        <div class="grid landscape">
          <figure class="">
            <a href="./logos/dark/landscape-01-template-vault.svg">
              <img src="./logos/dark/landscape-01-template-vault.svg" alt="Template Vault landscape logo" />
              <figcaption>01 Template Vault</figcaption>
            </a>
          </figure>
          <figure class="">
            <a href="./logos/dark/landscape-02-skill-packs.svg">
              <img src="./logos/dark/landscape-02-skill-packs.svg" alt="Skill Packs landscape logo" />
              <figcaption>02 Skill Packs</figcaption>
            </a>
          </figure>
          <figure class="">
            <a href="./logos/dark/landscape-03-fuzzy-search.svg">
              <img src="./logos/dark/landscape-03-fuzzy-search.svg" alt="Fuzzy Search landscape logo" />
              <figcaption>03 Fuzzy Search</figcaption>
            </a>
          </figure>
        </div>
      </section>

      <section>
        <h2>Landscape Light</h2>
        <div class="grid landscape">
          <figure class=" light-surface">
            <a href="./logos/light/landscape-01-template-vault-light.svg">
              <img src="./logos/light/landscape-01-template-vault-light.svg" alt="Template Vault light landscape logo" />
              <figcaption>01 Template Vault Light</figcaption>
            </a>
          </figure>
          <figure class=" light-surface">
            <a href="./logos/light/landscape-02-skill-packs-light.svg">
              <img src="./logos/light/landscape-02-skill-packs-light.svg" alt="Skill Packs light landscape logo" />
              <figcaption>02 Skill Packs Light</figcaption>
            </a>
          </figure>
          <figure class=" light-surface">
            <a href="./logos/light/landscape-03-fuzzy-search-light.svg">
              <img src="./logos/light/landscape-03-fuzzy-search-light.svg" alt="Fuzzy Search light landscape logo" />
              <figcaption>03 Fuzzy Search Light</figcaption>
            </a>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
