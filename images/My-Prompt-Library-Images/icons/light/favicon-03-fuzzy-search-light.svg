<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">My Prompt Library Fuzzy Search favicon concept light</title>
  <desc id="desc">A search lens over ranked prompt lines Square favicon proposal for My Prompt Library.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="24" x2="228" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="32" y1="30" x2="224" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="54" fill="url(#bg)"/>
  <rect x="20" y="20" width="216" height="216" rx="42" fill="none" stroke="url(#accent)" stroke-width="8"/>
