<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2BD6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0B0014" rx="20"/>
  
  <!-- Terminal/Prompt Symbol -->
  <path d="M 25 30 L 40 45 L 25 60" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Underscore/Cursor -->
  <rect x="48" y="55" width="25" height="5" fill="url(#grad)" rx="2"/>
  
  <!-- Decorative dots -->
  <circle cx="15" cy="15" r="3" fill="#FF2BD6" opacity="0.6"/>
  <circle cx="85" cy="85" r="3" fill="#00E5FF" opacity="0.6"/>
</svg>
